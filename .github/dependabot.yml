version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Madrid"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Europe/Madrid"
    labels:
      - "dependencies"
      - "rust"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Madrid"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      javascript-dependencies:
        patterns:
          - "*"
